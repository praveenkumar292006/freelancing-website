<!DOCTYPE html>
<html>
<head>
<title>Recruiter Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.navbar{
  background:#6f42c1;
  color:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
}
.box{
  margin:30px;
  padding:20px;
  background:white;
  border-radius:8px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
button{
  padding:8px 12px;
  background:#6f42c1;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
  <div>SkillConnect - Recruiter</div>
  <div><a href="#" onclick="logout()" style="color:white;">Logout</a></div>
</div>

<div class="box">
  <h3 id="welcome"></h3>
  <p>Post jobs and manage applications here.</p>
  <button>Post Job</button>
</div>

<script>
const user = localStorage.getItem("username");
const role = localStorage.getItem("role");

if(!user || role!=="Recruiter"){
  window.location.href="index.html";
}

document.getElementById("welcome").innerText="Welcome "+user;

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}
</script>

</body>
</html>
